<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

  <title>Generative AI</title>
  <style>

    body {
      margin: 0;
        font-family: Cairo;
      background-color: #EDF2F4;
      color: #2B2D42;
      scroll-behavior: smooth;
    }

   header {
  background-color: rgba(43, 45, 66, 0.95);
  color: white;
  padding: 12px 30px;
  position: sticky;
  top: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
}

header h2 {
  margin: 0;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
 background-image: url("/img//ai/Robot\ face-pana.png");
  background-size: cover;        /* يخلي الصورة تغطي كامل الشاشة */
  background-position: center;   /* توسيط الصورة */
  background-repeat: no-repeat;      color: white;
      animation: fadeIn 1.5s ease-in-out;
        position: relative;

    }
    .hero::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(43, 45, 66, 0.7); /* لون غامق شفاف */
  z-index: 1;
}
.hero * {
  position: relative;
  z-index: 2;
}

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      animation: slideDown 1s ease-in-out;
    }

    .hero p {
      font-size: 1.2rem;
      margin-bottom: 20px;
      color: #EDF2F4;
      animation: fadeIn 2s ease-in-out;
    }

    .btn {
      padding: 12px 25px;
      font-size: 1rem;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      margin: 5px;
      transition: 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background-color: #EF233C;
      color: white;
    }

    .btn-primary:hover {
      background-color: #D90429;
      transform: scale(1.05);
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    #about {
      background-color: white;
      animation: fadeUp 1s ease-in-out;
    }

    footer {
      background-color: #2B2D42;
      color: white;
      text-align: center;
      padding: 10px;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

  </style>
</head>
<body>

  <header>
    <h2>الذكاء الاصطناعي التوليدي</h2>
  </header>

  <section class="hero">
    <h1>مرحباً بك 👋</h1>
    <p>اكتشف عالم الذكاء الاصطناعي التوليدي</p>
    <a href="/index2.html" class="btn btn-primary">ابدأ الآن</a>
  </section>


  <footer>
    <p>© 2026 جميع الحقوق محفوظة</p>
  </footer>

</body>
</html>
